<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>掼蛋计分牌</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Noto+Serif+SC:wght@400;700;900&family=Oswald:wght@600;700&display=swap');

  :root {
    --red:        #D10A1E;
    --red-deep:   #8B0000;
    --red-mid:    #C0000F;
    --red-light:  #FF4D5E;
    --red-pale:   #FFF0F1;
    --red-border: #E07080;

    --blue:        #0055BB;
    --blue-deep:   #003380;
    --blue-mid:    #0044AA;
    --blue-light:  #3388EE;
    --blue-pale:   #EEF5FF;
    --blue-border: #6699DD;

    --gold:        #A86800;
    --gold-mid:    #C8860A;
    --gold-light:  #E8A020;
    --gold-pale:   #FFF8E0;

    --bg-top:    #F8EFE0;
    --bg-mid:    #E8F0FA;
    --bg-bot:    #F8EAF0;
    --divider:   #B8A890;
    --text-dark: #1A1A1A;
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  body {
    background: linear-gradient(165deg, var(--bg-top) 0%, var(--bg-mid) 48%, var(--bg-bot) 100%);
    min-height: 100vh;
    font-family: 'Noto Serif SC', serif;
    display: flex; flex-direction: column; align-items: center;
    overflow-x: hidden; position: relative;
  }
  body::before {
    content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
    background:
      radial-gradient(ellipse 60% 40% at 12% 50%, rgba(209,10,30,0.10) 0%, transparent 65%),
      radial-gradient(ellipse 60% 40% at 88% 50%, rgba(0,85,187,0.10) 0%, transparent 65%),
      radial-gradient(ellipse 50% 25% at 50% 5%,  rgba(168,104,0,0.07)  0%, transparent 55%);
  }

  /* ══════════════════════════════
     HEADER
  ══════════════════════════════ */
  header {
    position:relative; z-index:1;
    width:100%; text-align:center;
    padding: 20px 16px 6px;
  }
  .title-wrap {
    display:inline-flex; flex-direction:column; align-items:center;
    background: linear-gradient(145deg, #FFFBEE, #FFF5CC);
    border: 3px solid var(--gold-light);
    border-radius: 12px;
    padding: 10px 40px 8px;
    position:relative;
    box-shadow: 0 6px 24px rgba(168,104,0,0.20), inset 0 1px 0 rgba(255,255,255,0.95), 0 0 0 1px rgba(168,104,0,0.08);
  }
  .title-wrap::before, .title-wrap::after {
    content:'◈'; color:var(--gold-light); font-size:16px;
    position:absolute; top:50%; transform:translateY(-50%);
    text-shadow: 0 0 8px rgba(168,104,0,0.4);
  }
  .title-wrap::before { left:12px; }
  .title-wrap::after  { right:12px; }

  h1 {
    font-family:'Playfair Display',serif;
    font-size:clamp(26px,7vw,40px); font-weight:900;
    letter-spacing:10px; color:var(--gold);
    text-shadow: 0 2px 0 rgba(255,255,255,0.9), 0 3px 10px rgba(168,104,0,0.25);
    line-height:1;
  }
  .title-en {
    font-family:'Oswald',sans-serif; font-weight:700;
    font-size:10px; letter-spacing:6px;
    color:var(--gold-mid); margin-top:3px; opacity:0.85;
  }

  /* ══════════════════════════════
     ROUND BAR
  ══════════════════════════════ */
  .round-bar {
    position:relative; z-index:1;
    display:flex; align-items:center; gap:6px;
    margin: 10px 0 8px;
    background: rgba(255,255,255,0.80);
    border: 2px solid var(--divider);
    border-radius: 24px;
    padding: 5px 22px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.08);
  }
  .round-zh { font-size:12px; font-weight:700; color:#666; letter-spacing:2px; }
  .round-num { font-family:'Playfair Display',serif; font-size:20px; font-weight:900; color:var(--gold); line-height:1; }
  .round-en { font-family:'Oswald',sans-serif; font-size:10px; font-weight:600; color:#999; letter-spacing:3px; margin-left:2px; }

  /* ══════════════════════════════
     BOARD
  ══════════════════════════════ */
  .board {
    position:relative; z-index:1;
    width:100%; max-width:540px;
    display:grid; grid-template-columns:1fr 46px 1fr;
    padding:0 10px; flex:1;
  }

  /* ══════════════════════════════
     TEAM PANEL
  ══════════════════════════════ */
  .team {
    display:flex; flex-direction:column; align-items:center;
    padding: 0 6px 18px;
    border-radius: 22px; position:relative;
    overflow:hidden; cursor:pointer; user-select:none;
    transition: transform 0.12s, box-shadow 0.15s;
  }
  .team:active { transform:scale(0.970); }

  .team.red {
    background: linear-gradient(175deg, #FFF0F1 0%, #FFE2E5 60%, #FFDDE0 100%);
    border: 3px solid var(--red-border);
    box-shadow: 0 8px 32px rgba(209,10,30,0.15), 0 2px 6px rgba(209,10,30,0.08), inset 0 1px 0 rgba(255,255,255,0.95);
  }
  .team.blue {
    background: linear-gradient(175deg, #EEF5FF 0%, #DDE8FF 60%, #D4E2FF 100%);
    border: 3px solid var(--blue-border);
    box-shadow: 0 8px 32px rgba(0,85,187,0.15), 0 2px 6px rgba(0,85,187,0.08), inset 0 1px 0 rgba(255,255,255,0.95);
  }

  /* Top accent bar */
  .team-header {
    width:100%; padding: 10px 8px 8px;
    display:flex; flex-direction:column; align-items:center;
    border-radius: 19px 19px 0 0;
    margin-bottom: 8px;
  }
  .team.red  .team-header { background: linear-gradient(135deg, var(--red-mid), var(--red-deep)); }
  .team.blue .team-header { background: linear-gradient(135deg, var(--blue-mid), var(--blue-deep)); }

  .team-name {
    font-size: clamp(17px,4.5vw,24px); font-weight:900;
    letter-spacing: 6px; color:#FFFFFF;
    text-shadow: 0 1px 3px rgba(0,0,0,0.3);
    line-height:1.1;
  }
  .team-name-en {
    font-family:'Oswald',sans-serif; font-weight:700;
    font-size: clamp(9px,2vw,11px); letter-spacing:4px;
    color:rgba(255,255,255,0.70); margin-top:2px;
  }

  /* ══════════════════════════════
     PLAYING CARD
  ══════════════════════════════ */
  .card-display {
    width:86%; aspect-ratio:5/7; max-height:195px;
    border-radius:14px; display:flex; align-items:center; justify-content:center;
    margin-bottom:12px; position:relative;
    transition: transform 0.3s cubic-bezier(0.175,0.885,0.32,1.275);
    flex-shrink:0; background:#FFFFFF;
  }
  .team.red .card-display {
    border: 3px solid var(--red-border);
    box-shadow: 0 8px 28px rgba(209,10,30,0.22), 0 2px 6px rgba(209,10,30,0.12), inset 0 1px 0 #FFF;
  }
  .team.blue .card-display {
    border: 3px solid var(--blue-border);
    box-shadow: 0 8px 28px rgba(0,85,187,0.22), 0 2px 6px rgba(0,85,187,0.12), inset 0 1px 0 #FFF;
  }
  .card-display::before {
    content:''; position:absolute; inset:7px; border-radius:10px; opacity:0.04;
  }
  .team.red .card-display::before  { background:repeating-linear-gradient(45deg,var(--red)  0,var(--red)  1px,transparent 1px,transparent 8px); }
  .team.blue .card-display::before { background:repeating-linear-gradient(45deg,var(--blue) 0,var(--blue) 1px,transparent 1px,transparent 8px); }

  .card-value-wrap { display:flex; flex-direction:column; align-items:center; z-index:1; }

  .card-value {
    font-family:'Playfair Display',serif;
    font-size:clamp(54px,14vw,92px); font-weight:900; line-height:1;
    transition:all 0.2s; text-align:center;
  }
  .team.red .card-value  { color:var(--red);  text-shadow:0 3px 14px rgba(209,10,30,0.30); }
  .team.blue .card-value { color:var(--blue); text-shadow:0 3px 14px rgba(0,85,187,0.30); }

  .card-sub {
    font-family:'Oswald',sans-serif; font-weight:700;
    font-size:clamp(11px,2.5vw,15px); letter-spacing:3px;
    margin-top:-2px; opacity:0; transition:opacity 0.25s;
  }
  .card-sub.show { opacity:1; }
  .team.red .card-sub  { color:var(--red-mid); }
  .team.blue .card-sub { color:var(--blue-mid); }

  .card-corner {
    position:absolute; font-family:'Playfair Display',serif;
    font-size:15px; font-weight:900; line-height:1; z-index:2;
    display:flex; flex-direction:column; align-items:center; gap:1px;
  }
  .card-corner.tl { top:8px; left:10px; }
  .card-corner.br { bottom:8px; right:10px; transform:rotate(180deg); }
  .team.red .card-corner  { color:var(--red); }
  .team.blue .card-corner { color:var(--blue); }
  .card-corner .suit { font-size:11px; }

  .card-center-suit { position:absolute; font-size:22px; opacity:0.07; bottom:14px; left:50%; transform:translateX(-50%); z-index:1; }
  .team.red .card-center-suit  { color:var(--red); }
  .team.blue .card-center-suit { color:var(--blue); }

  .a-badge {
    position:absolute; top:7px; right:7px; z-index:3;
    background:linear-gradient(135deg,var(--gold-light),var(--gold));
    color:#FFF; font-family:'Oswald',sans-serif; font-size:11px; font-weight:700; letter-spacing:1px;
    padding:3px 7px; border-radius:8px; opacity:0; transition:opacity 0.3s;
    box-shadow:0 2px 8px rgba(168,104,0,0.45);
  }
  .a-badge.show { opacity:1; }

  /* ══════════════════════════════
     SCORE DISPLAY (bigger, bolder)
  ══════════════════════════════ */
  .score-block { display:flex; flex-direction:column; align-items:center; gap:1px; }

  .score-num {
    font-family:'Playfair Display',serif;
    font-size: clamp(34px,8.5vw,52px);
    font-weight:900; letter-spacing:3px; line-height:1;
  }
  .team.red .score-num  { color:var(--red-deep);  text-shadow:0 2px 8px rgba(209,10,30,0.20); }
  .team.blue .score-num { color:var(--blue-deep); text-shadow:0 2px 8px rgba(0,85,187,0.20); }

  .score-zh { font-size:11px; font-weight:700; letter-spacing:4px; margin-top:1px; }
  .team.red .score-zh  { color:var(--red-mid); }
  .team.blue .score-zh { color:var(--blue-mid); }

  .score-en {
    font-family:'Oswald',sans-serif; font-weight:600;
    font-size:9px; letter-spacing:3px; opacity:0.65;
  }
  .team.red .score-en  { color:var(--red); }
  .team.blue .score-en { color:var(--blue); }

  /* ══════════════════════════════
     PROGRESS PIPS
  ══════════════════════════════ */
  .pips { display:flex; gap:5px; flex-wrap:wrap; justify-content:center; margin-top:10px; max-width:124px; }
  .pip { width:10px; height:10px; border-radius:50%; transition:all 0.3s cubic-bezier(0.175,0.885,0.32,1.275); }
  .team.red .pip  { background:rgba(209,10,30,0.10); border:2px solid rgba(209,10,30,0.22); }
  .team.red .pip.active  { background:var(--red);  border-color:var(--red-deep);  box-shadow:0 0 8px rgba(209,10,30,0.55); transform:scale(1.18); }
  .team.blue .pip { background:rgba(0,85,187,0.10); border:2px solid rgba(0,85,187,0.22); }
  .team.blue .pip.active { background:var(--blue); border-color:var(--blue-deep); box-shadow:0 0 8px rgba(0,85,187,0.55); transform:scale(1.18); }

  /* ══════════════════════════════
     DIVIDER
  ══════════════════════════════ */
  .divider { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px; padding:8px 0; position:relative; z-index:2; }
  .divider-line { width:2px; flex:1; background:linear-gradient(to bottom,transparent,var(--divider),transparent); }
  .vs-badge {
    width:40px; height:40px; border-radius:50%;
    background:linear-gradient(145deg,#FFFBEE,#FFF4CC);
    border:2.5px solid var(--gold-light);
    display:flex; align-items:center; justify-content:center;
    font-family:'Oswald',sans-serif; font-size:11px; font-weight:700; color:var(--gold); letter-spacing:1px;
    box-shadow:0 4px 14px rgba(168,104,0,0.25);
  }

  /* ══════════════════════════════
     CONTROLS
  ══════════════════════════════ */
  .controls { position:relative; z-index:1; width:100%; max-width:540px; padding:10px 10px 6px; display:flex; flex-direction:column; gap:8px; }
  .btn-row { display:flex; gap:7px; }

  .btn {
    flex:1; border:none; border-radius:12px; padding:0 4px; height:52px;
    font-family:'Noto Serif SC',serif; font-size:12px; font-weight:900;
    cursor:pointer; transition:all 0.14s;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1px;
  }
  .btn:active { transform:scale(0.93); }
  .btn .btn-zh { font-size:13px; font-weight:900; letter-spacing:1px; line-height:1; }
  .btn .btn-en { font-family:'Oswald',sans-serif; font-size:8px; font-weight:600; letter-spacing:2px; opacity:0.75; }

  .btn-red-plus  { background:linear-gradient(145deg,var(--red-light),var(--red-deep)); color:#FFF; box-shadow:0 5px 18px rgba(209,10,30,0.40); border:1.5px solid rgba(255,255,255,0.15); }
  .btn-red-minus { background:linear-gradient(145deg,#FFE8EA,#FFCDD2); color:var(--red-deep); border:2px solid var(--red-border); box-shadow:0 3px 10px rgba(209,10,30,0.12); }
  .btn-blue-plus  { background:linear-gradient(145deg,var(--blue-light),var(--blue-deep)); color:#FFF; box-shadow:0 5px 18px rgba(0,85,187,0.40); border:1.5px solid rgba(255,255,255,0.15); }
  .btn-blue-minus { background:linear-gradient(145deg,#DDE8FF,#C8D8FF); color:var(--blue-deep); border:2px solid var(--blue-border); box-shadow:0 3px 10px rgba(0,85,187,0.12); }

  .btn-reset {
    flex:none; width:66px; height:52px;
    background:linear-gradient(145deg,#F5EEE0,#EAE0CC);
    border:2px solid var(--divider); color:#6A5C40;
    font-family:'Noto Serif SC',serif;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1px;
    border-radius:12px; cursor:pointer; transition:all 0.14s;
    box-shadow:0 3px 10px rgba(0,0,0,0.08);
  }
  .btn-reset:active { transform:scale(0.93); }
  .btn-reset .btn-zh { font-size:12px; font-weight:900; letter-spacing:1px; }
  .btn-reset .btn-en { font-family:'Oswald',sans-serif; font-size:7px; font-weight:600; letter-spacing:2px; opacity:0.65; }

  .btn-new-round {
    width:100%; height:50px;
    background:linear-gradient(145deg,var(--gold-light),var(--gold));
    border:2px solid rgba(255,255,255,0.25); color:#FFF;
    border-radius:14px; cursor:pointer; transition:all 0.14s;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px;
    box-shadow:0 5px 20px rgba(168,104,0,0.38); text-shadow:0 1px 3px rgba(0,0,0,0.15);
  }
  .btn-new-round:active { transform:scale(0.96); }
  .btn-new-round .btn-zh { font-family:'Noto Serif SC',serif; font-size:15px; font-weight:900; letter-spacing:5px; line-height:1; }
  .btn-new-round .btn-en { font-family:'Oswald',sans-serif; font-size:8px; font-weight:600; letter-spacing:4px; opacity:0.80; }

  /* ══════════════════════════════
     HINT
  ══════════════════════════════ */
  .hint { text-align:center; font-size:10px; font-weight:700; color:#9A8870; letter-spacing:2px; padding:4px 0 14px; position:relative; z-index:1; }

  /* ══════════════════════════════
     A-STAGE POPUP
  ══════════════════════════════ */
  .a-popup-overlay {
    display:none; position:fixed; inset:0; z-index:200;
    background:rgba(220,205,180,0.80); backdrop-filter:blur(8px);
    align-items:center; justify-content:center;
  }
  .a-popup-overlay.show { display:flex; }
  .a-popup {
    border-radius:24px; padding:28px 28px 24px;
    text-align:center; min-width:250px; max-width:300px;
    box-shadow:0 20px 60px rgba(0,0,0,0.20);
    animation:popIn 0.3s cubic-bezier(0.175,0.885,0.32,1.275);
  }
  .a-popup.red  { background:linear-gradient(145deg,#FFF0F1,#FFE0E4); border:3px solid var(--red-border); }
  .a-popup.blue { background:linear-gradient(145deg,#EEF5FF,#DDEEFF); border:3px solid var(--blue-border); }

  .a-popup-title { font-family:'Playfair Display',serif; font-size:32px; font-weight:900; letter-spacing:3px; line-height:1; }
  .a-popup.red  .a-popup-title { color:var(--red-deep); }
  .a-popup.blue .a-popup-title { color:var(--blue-deep); }

  .a-popup-title-en { font-family:'Oswald',sans-serif; font-size:10px; font-weight:700; letter-spacing:4px; opacity:0.6; margin-top:2px; margin-bottom:6px; }
  .a-popup.red  .a-popup-title-en { color:var(--red); }
  .a-popup.blue .a-popup-title-en { color:var(--blue); }

  .a-popup-sub { font-size:12px; font-weight:700; letter-spacing:2px; margin-bottom:6px; }
  .a-popup.red  .a-popup-sub { color:var(--red-light); }
  .a-popup.blue .a-popup-sub { color:var(--blue-light); }

  .a-popup-desc { font-size:11px; color:#777; letter-spacing:1px; margin-bottom:20px; line-height:1.8; font-weight:700; }

  .a-popup-btns { display:flex; gap:10px; }
  .a-pop-btn {
    flex:1; padding:0 8px; height:52px; border:none; border-radius:14px;
    cursor:pointer; transition:all 0.14s;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px;
  }
  .a-pop-btn:active { transform:scale(0.95); }
  .a-pop-btn .p-zh { font-family:'Noto Serif SC',serif; font-size:15px; font-weight:900; letter-spacing:2px; line-height:1; }
  .a-pop-btn .p-en { font-family:'Oswald',sans-serif; font-size:8px; font-weight:700; letter-spacing:3px; opacity:0.80; }

  .a-pop-btn-pass { background:linear-gradient(135deg,#2ECC71,#1A9950); color:#FFF; box-shadow:0 5px 16px rgba(30,160,80,0.38); }
  .a-pop-btn-fail { background:rgba(0,0,0,0.06); border:2px solid var(--divider); color:#555; }
  .a-pop-btn-fail .p-zh { color:#444; }
  .a-pop-btn-fail .p-en { color:#888; }

  /* ══════════════════════════════
     WIN OVERLAY
  ══════════════════════════════ */
  .win-overlay { display:none; position:fixed; inset:0; z-index:300; background:rgba(220,205,180,0.88); backdrop-filter:blur(10px); align-items:center; justify-content:center; flex-direction:column; gap:16px; }
  .win-overlay.show { display:flex; }
  .win-box { border-radius:26px; padding:36px 48px; text-align:center; animation:popIn 0.5s cubic-bezier(0.175,0.885,0.32,1.275); box-shadow:0 24px 70px rgba(0,0,0,0.18); }
  .win-box.red  { background:linear-gradient(145deg,#FFF0F1,#FFE0E4); border:3px solid var(--red-border); }
  .win-box.blue { background:linear-gradient(145deg,#EEF5FF,#DDEEFF); border:3px solid var(--blue-border); }
  .win-emoji { font-size:60px; margin-bottom:10px; }
  .win-title-zh { font-family:'Playfair Display',serif; font-size:32px; font-weight:900; letter-spacing:4px; line-height:1; }
  .win-box.red  .win-title-zh { color:var(--red-deep); }
  .win-box.blue .win-title-zh { color:var(--blue-deep); }
  .win-title-en { font-family:'Oswald',sans-serif; font-size:11px; font-weight:700; letter-spacing:5px; opacity:0.55; margin-top:3px; margin-bottom:6px; }
  .win-box.red  .win-title-en { color:var(--red); }
  .win-box.blue .win-title-en { color:var(--blue); }
  .win-sub { font-size:12px; font-weight:700; color:var(--gold-mid); letter-spacing:3px; }
  .win-btns { display:flex; gap:12px; margin-top:24px; }
  .win-btn {
    padding:0 20px; height:50px; border-radius:12px; border:none;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px;
    cursor:pointer; transition:0.14s;
  }
  .win-btn:active { transform:scale(0.95); }
  .win-btn .w-zh { font-family:'Noto Serif SC',serif; font-size:13px; font-weight:900; letter-spacing:2px; line-height:1; }
  .win-btn .w-en { font-family:'Oswald',sans-serif; font-size:8px; font-weight:600; letter-spacing:3px; opacity:0.75; }
  .win-btn-continue { background:linear-gradient(135deg,var(--gold-light),var(--gold)); color:#FFF; box-shadow:0 5px 18px rgba(168,104,0,0.35); }
  .win-btn-reset    { background:rgba(0,0,0,0.06); border:2px solid var(--divider); color:#666; }
  .win-btn-reset .w-zh { color:#555; }

  /* ══════════════════════════════
     ANIMATIONS
  ══════════════════════════════ */
  @keyframes flashRed {
    0%,100% { box-shadow:0 8px 32px rgba(209,10,30,0.15),0 2px 6px rgba(209,10,30,0.08),inset 0 1px 0 rgba(255,255,255,0.95); }
    40%      { box-shadow:0 10px 50px rgba(209,10,30,0.50),0 2px 6px rgba(209,10,30,0.08),inset 0 1px 0 rgba(255,255,255,0.95); }
  }
  @keyframes flashBlue {
    0%,100% { box-shadow:0 8px 32px rgba(0,85,187,0.15),0 2px 6px rgba(0,85,187,0.08),inset 0 1px 0 rgba(255,255,255,0.95); }

<script>
  const MAX=14;
  let state={red:2,blue:2,round:1,history:[]};
  let justReachedA={red:false,blue:false};

  function mainLabel(s){
    if(s>=14) return 'A';
    if(s<=10) return String(s);
    return {11:'J',12:'Q',13:'K'}[s];
  }
  function subLabel(s){ if(s===15) return 'ROUND 2'; if(s===16) return 'ROUND 3'; return ''; }
  function badgeLabel(s){ if(s===15) return 'A²'; if(s===16) return 'A³'; return ''; }
  function scoreDisplay(t){
    const s=state[t];
    if(s===15) return 'A²'; if(s===16) return 'A³';
    return mainLabel(s);
  }
  function isAStage(t){ return state[t]>=14; }

  function renderPips(t,s){
    const el=document.getElementById(t+'Pips'); el.innerHTML='';
    const filled=Math.min(s,14)-2;
    for(let i=0;i<13;i++){const d=document.createElement('div');d.className='pip'+(i<filled?' active':'');el.appendChild(d);}
  }

  function renderTeam(t){
    const s=state[t];
    const ml=mainLabel(s), sl=subLabel(s), bl=badgeLabel(s);
    document.getElementById(t+'CardVal').textContent=ml;
    document.getElementById(t+'CornerTL').textContent=ml;
    document.getElementById(t+'CornerBR').textContent=ml;
    document.getElementById(t+'Score').textContent=scoreDisplay(t);
    const subEl=document.getElementById(t+'CardSub');
    subEl.textContent=sl; subEl.classList.toggle('show',!!sl);
    const badgeEl=document.getElementById(t+'ABadge');
    badgeEl.textContent=bl; badgeEl.classList.toggle('show',!!bl);
    renderPips(t,s);
  }

  function render(){
    renderTeam('red'); renderTeam('blue');
    document.getElementById('roundNum').textContent=state.round;
  }

  function animateCard(t){
    const c=document.getElementById(t+'Card'),p=document.getElementById(t+'Team');
    c.classList.remove('pop');p.classList.remove('flash-'+t);void c.offsetWidth;
    c.classList.add('pop');p.classList.add('flash-'+t);
    setTimeout(()=>p.classList.remove('flash-'+t),450);
  }

  function onTeamClick(t){
    if(isAStage(t)){
      if(justReachedA[t]){ justReachedA[t]=false; return; }
      openAPopup(t);
    } else { addScore(t); }
  }

  function addScore(t){
    if(isAStage(t)){ openAPopup(t); return; }
    const wasK=(state[t]===13);
    state[t]++;
    if(wasK) justReachedA[t]=true;
    animateCard(t); render();
  }

  function subScore(t){
    if(state[t]<=2) return;
    state[t]--; render();
  }

  let currentATeam=null;
  function openAPopup(t){
    currentATeam=t;
    const s=state[t];
    const box=document.getElementById('aPopupBox');
    box.className='a-popup '+t;
    document.getElementById('aPopupTitle').textContent=mainLabel(s);
    document.getElementById('aPopupSub').textContent=(t==='red'?'红队':'蓝队')+' · '+(s===14?'第 1 关':s===15?'第 2 关':'第 3 关');
    let desc='';
    if(s===14) desc='过了即赢，没过进入 A²';
    else if(s===15) desc='过了即赢，没过进入 A³';
    else desc='最后机会！没过则重置回 2';
    document.getElementById('aPopupDesc').textContent=desc;
    document.getElementById('aPopup').classList.add('show');
  }

  function aResult(passed){
    document.getElementById('aPopup').classList.remove('show');
    const t=currentATeam;
    if(passed){ animateCard(t); setTimeout(()=>showWin(t),300); }
    else {
      const s=state[t];
      if(s===14){ state[t]=15; justReachedA[t]=true; }
      else if(s===15){ state[t]=16; justReachedA[t]=true; }
      else { state[t]=2; justReachedA[t]=false; }
      animateCard(t); render();
    }
    currentATeam=null;
  }

  function showWin(t){
    const box=document.getElementById('winBox');
    box.className='win-box '+t;
    document.getElementById('winTitle').textContent=(t==='red'?'红队':'蓝队')+'胜利！';
    document.getElementById('winTitleEn').textContent=(t==='red'?'RED TEAM':'BLUE TEAM')+' WINS!';
    const s=state[t]; const stage=s===14?'A':s===15?'A²':'A³';
    document.getElementById('winSub').textContent='在 '+stage+' 阶段过牌，赢得本局！';
    document.getElementById('winOverlay').classList.add('show');
    launchParticles(t);
  }

  function continueGame(){ document.getElementById('winOverlay').classList.remove('show'); stopParticles(); }
  function fullReset(){
    document.getElementById('winOverlay').classList.remove('show'); stopParticles();
    state={red:2,blue:2,round:1,history:[]}; justReachedA={red:false,blue:false}; render();
  }
  function newRound(){
    state.history.push({red:state.red,blue:state.blue});
    state.round++; state.red=2; state.blue=2;
    justReachedA={red:false,blue:false}; render();
    ['red','blue'].forEach(t=>{const c=document.getElementById(t+'Card');c.classList.remove('pop');void c.offsetWidth;c.classList.add('pop');});
  }
  function confirmReset(){
    state.red=2; state.blue=2; state.round=1; state.history=[];
    justReachedA={red:false,blue:false};
    ['red','blue'].forEach(t=>{const c=document.getElementById(t+'Card');c.classList.remove('pop');void c.offsetWidth;c.classList.add('pop');});
    render();
  }

  // PARTICLES
  let pAnim=null,pArr=[];
  function launchParticles(t){
    const canvas=document.getElementById('particles');
    canvas.classList.add('show');
    const ctx=canvas.getContext('2d');
    canvas.width=window.innerWidth; canvas.height=window.innerHeight;
    const colors=t==='red'
      ?['#D10A1E','#FF4D5E','#FFAAAA','#A86800','#FFD700','#FFFFFF']
      :['#0055BB','#3388EE','#88CCFF','#A86800','#FFD700','#FFFFFF'];
    pArr=[];
    for(let i=0;i<130;i++){
      pArr.push({x:Math.random()*canvas.width,y:canvas.height+10,vx:(Math.random()-0.5)*5,vy:-(Math.random()*10+4),r:Math.random()*7+2,color:colors[Math.floor(Math.random()*colors.length)],alpha:1,rot:Math.random()*360,rotV:(Math.random()-0.5)*9});
    }
    function loop(){
      ctx.clearRect(0,0,canvas.width,canvas.height);
      pArr.forEach(p=>{
        p.x+=p.vx;p.y+=p.vy;p.vy+=0.13;p.rot+=p.rotV;p.alpha-=0.007;
        ctx.save();ctx.globalAlpha=Math.max(0,p.alpha);ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);ctx.fillStyle=p.color;
        if(p.r>5){ctx.beginPath();ctx.arc(0,0,p.r/2,0,Math.PI*2);ctx.fill();}
        else{ctx.fillRect(-p.r,-p.r/2,p.r*2,p.r);}
        ctx.restore();
      });
      pArr=pArr.filter(p=>p.alpha>0);
      if(pArr.length>0) pAnim=requestAnimationFrame(loop); else stopParticles();
    }
    if(pAnim) cancelAnimationFrame(pAnim);
    pAnim=requestAnimationFrame(loop);
  }
  function stopParticles(){
    if(pAnim){cancelAnimationFrame(pAnim);pAnim=null;}
    const c=document.getElementById('particles');c.classList.remove('show');c.getContext('2d').clearRect(0,0,c.width,c.height);
  }

  render();
</script>
