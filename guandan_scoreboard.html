<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="version" content="v18.0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>掼蛋计分器 · 硅谷掼蛋协会</title>
<meta http-equiv="refresh" content="3; url=https://silicon-guandan-system.onrender.com/guandan">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(150deg,#FDF5E8 0%,#EAF0FC 45%,#FCE8EE 100%);
    font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei',serif;
  }
  .box{
    text-align:center;padding:48px 40px;
    background:rgba(255,255,255,0.85);
    border-radius:24px;
    box-shadow:0 8px 40px rgba(168,104,0,0.12);
    max-width:420px;width:90%;
  }
  .logo{font-size:52px;margin-bottom:16px;}
  h1{font-size:22px;color:#8B1A1A;margin-bottom:8px;font-weight:900;}
  .sub{font-size:13px;color:#999;margin-bottom:28px;}
  .msg{font-size:15px;color:#555;margin-bottom:20px;line-height:1.7;}
  .count{
    font-size:42px;font-weight:900;color:#A86800;
    margin:16px 0;
    font-family:'Noto Serif SC',serif;
  }
  .btn{
    display:inline-block;margin-top:8px;
    background:linear-gradient(135deg,#C0000F,#8B0000);
    color:#FFD700;text-decoration:none;
    padding:14px 32px;border-radius:50px;
    font-size:16px;font-weight:700;
    box-shadow:0 4px 16px rgba(139,0,0,0.3);
    letter-spacing:1px;
  }
  .new-url{
    margin-top:20px;font-size:12px;color:#aaa;word-break:break-all;
  }
</style>
</head>
<body>
<div class="box">
  <div class="logo">🎴</div>
  <h1>掼蛋计分器</h1>
  <div class="sub">硅谷掼蛋协会 · Silicon Valley Guandan Association</div>
  <div class="msg">
    计分器已升级到新服务器<br>
    广告加载更快，体验更流畅<br>
    <strong>正在自动跳转</strong>，请稍候…
  </div>
  <div class="count" id="cnt">3</div>
  <a class="btn" href="https://silicon-guandan-system.onrender.com/guandan">
    🃏 立即前往新版
  </a>
  <div class="new-url">新地址：silicon-guandan-system.onrender.com/guandan</div>
</div>
<script>
var n = 3;
var t = setInterval(function(){
  n--;
  document.getElementById('cnt').textContent = n;
  if(n <= 0){
    clearInterval(t);
    window.location.replace('https://silicon-guandan-system.onrender.com/guandan');
  }
}, 1000);
</script>
</body>
</html>
